version: "3.9"

services:

  db:
    image: mysql:8
    container_name: mysql_db
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: users

    volumes:
      - ./docker-mysql/sqlfiles:/docker-entrypoint-initdb.d

    ports:
      - "3307:3306"

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  api:
    build: ./api
    ports:
      - "8000:8000"

    environment:
      MYSQL_HOST: db
      MYSQL_USER: root
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: users

    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: react.Dockerfile

    ports:
      - "3000:3000"

    environment:
      REACT_APP_SERVER_PORT: 8000

    depends_on:
      - api