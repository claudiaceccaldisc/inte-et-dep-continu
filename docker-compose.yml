services:

  db:
    image: mysql:8
    volumes:
      - ./docker-mysql/sqlfiles:/docker-entrypoint-initdb.d
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: users
    ports:
      - "3307:3306"

    volumes:
      - ./docker-mysql/sqlfiles:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: users
      MYSQL_HOST: db   # 🔥 IMPORTANT
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: react.Dockerfile
    ports:
      - "3000:3000"
    environment:
      REACT_APP_SERVER_PORT: ${REACT_APP_SERVER_PORT}
    depends_on:
      - api