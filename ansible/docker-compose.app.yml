services:
  db:
    image: mysql:8
    container_name: mysql_db
    restart: always
    # Keep MySQL RAM usage low so the stack fits on small EC2 instances (avoids OOM / SSH loss).
    command:
      - --performance_schema=OFF
      - --innodb_buffer_pool_size=128M
      - --max_connections=80
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker-mysql/sqlfiles:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 90s

  adminer:
    image: adminer
    container_name: adminer
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"

  api:
    image: "{{ registry_url }}/backend:latest"
    container_name: api
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      MYSQL_HOST: db
      MYSQL_USER: root
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    image: "{{ registry_url }}/frontend:latest"
    container_name: frontend
    restart: always
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  mysql_data: