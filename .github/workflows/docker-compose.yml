name: Docker Compose Integration

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # push:
  #   branches: [ arnaud-dev ]
  workflow_dispatch:

jobs:
  docker-compose-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create .env file
        run: |
          echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" > .env
          echo "MYSQL_DATABASE=users" >> .env
          echo "REACT_APP_SERVER_PORT=8000" >> .env

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start Docker Compose
        run: docker compose up -d --build

      - name: Wait for API
        run: |
          for i in {1..30}; do
            curl -f http://localhost:8000/health && exit 0
            sleep 5
          done
          docker compose logs
          exit 1

      - name: Wait for Frontend
        run: |
          for i in {1..30}; do
            curl -f http://localhost:3000 && exit 0
            sleep 5
          done
          docker compose logs
          exit 1

      - name: Run Cypress
        run: npx cypress run --spec cypress/e2e/users.cy.js

      - name: Docker Hub login
        if: success()
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Push built images
        if: success()
        run: docker compose push api frontend

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop containers
        if: always()
        run: docker compose down -v