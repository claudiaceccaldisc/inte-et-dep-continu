name: Deploy Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - arnaud-dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Step 1 - Build Docker Frontend
        run: docker build -t frontend-test -f react.Dockerfile .

      - name: Step 1 bis - Build Docker API
        run: docker build -t api-test ./api

      - name: Step 2 - Install Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Step 2 bis - Terraform Init
        run: |
          cd terraform/app
          terraform init

      - name: Step 2 ter - Terraform Apply
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          cd terraform/app
          terraform apply -auto-approve

      - name: Step 3 - Get IP and SSH Key
        run: |
          cd terraform/app
          echo "PUBLIC_IP=$(terraform output -raw public_ip)" >> $GITHUB_ENV
          terraform output -raw private_key_pem > private_key.pem
          chmod 600 private_key.pem

      - name: Step 3.2 - Wait for SSH (IMPORTANT)
        run: |
          KEY="${GITHUB_WORKSPACE}/terraform/app/private_key.pem"
          echo "Waiting for SSH on ubuntu@${PUBLIC_IP} (up to ~7 min)..."
          for i in $(seq 1 40); do
            if ssh -i "$KEY" \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=10 \
              -o BatchMode=yes \
              ubuntu@"${PUBLIC_IP}" \
              "echo ssh_ok" 2>/dev/null; then
              echo "SSH is ready."
              exit 0
            fi
            echo "Attempt ${i}/40: SSH not ready yet, sleeping 10s..."
            sleep 10
          done
          echo "Timed out waiting for SSH on ${PUBLIC_IP}:22"
          exit 1

      - name: Step 3.5 - Generate .env file
        run: |
          echo "REACT_APP_SERVER_PORT=8000" >> .env
          echo "REACT_APP_API_URL=http://$PUBLIC_IP:8000" >> .env
          echo "MYSQL_DATABASE=users" >> .env
          echo "MYSQL_ROOT_PASSWORD=ynov-CICD" >> .env
          echo "REGISTRY_URL=$PUBLIC_IP:443" >> .env
          echo "REGISTRY_USERNAME=${{ secrets.REGISTRY_USERNAME }}" >> .env
          echo "REGISTRY_TOKEN=${{ secrets.REGISTRY_TOKEN }}" >> .env

      - name: Step 3.6 - Generate inventory.ini
        run: |
          echo "[registry_hosts]" > ansible/inventory.ini
          echo "$PUBLIC_IP ansible_user=ubuntu ansible_ssh_private_key_file=../terraform/app/private_key.pem" >> ansible/inventory.ini
          echo "" >> ansible/inventory.ini
          echo "[app_hosts]" >> ansible/inventory.ini
          echo "$PUBLIC_IP ansible_user=ubuntu ansible_ssh_private_key_file=../terraform/app/private_key.pem" >> ansible/inventory.ini

      - name: Step 4 - Deploy Registry
        run: |
          export $(grep REGISTRY_USERNAME .env)
          export $(grep REGISTRY_TOKEN .env)

          cd ansible
          ANSIBLE_HOST_KEY_CHECKING=False ansible-playbook -i inventory.ini playbook.yml \
          --extra-vars "registry_username=$REGISTRY_USERNAME registry_password=$REGISTRY_TOKEN"

      - name: Step 4.5 - Wait for Registry
        run: |
          echo "Attente du démarrage du registre..."
          sleep 15

      - name: Step 4.6 - Test Registry
        run: |
          echo "Test du registre..."
          curl -k https://$PUBLIC_IP:443/v2/ || true

      - name: Step 4.65 - Configure Docker for self-signed registry
        run: |
          sudo tee /etc/docker/daemon.json > /dev/null <<EOF
          {
            "insecure-registries": ["${PUBLIC_IP}:443"]
          }
          EOF
          sudo systemctl restart docker
          for i in $(seq 1 15); do
            docker info >/dev/null 2>&1 && break
            sleep 2
          done

      - name: Step 1 ter - Login + Tag + Push images (REGISTRY)
        run: |
          echo "${{ secrets.REGISTRY_TOKEN }}" | docker login "${PUBLIC_IP}:443" -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

          docker tag frontend-test "${PUBLIC_IP}:443/frontend:latest"
          docker tag api-test "${PUBLIC_IP}:443/backend:latest"

          docker push "${PUBLIC_IP}:443/frontend:latest"
          docker push "${PUBLIC_IP}:443/backend:latest"

      - name: Step 4.7 - Wait before App deploy
        run: |
          echo "Attente avant déploiement app (stabilisation Docker/SSH)..."
          sleep 30

      - name: Step 5 - Run Ansible Playbook (App)
        run: |
          set -a
          source .env
          set +a

          KEY="${GITHUB_WORKSPACE}/terraform/app/private_key.pem"

          wait_for_ssh() {
            echo "Waiting for SSH on ubuntu@${PUBLIC_IP}..."
            for i in $(seq 1 18); do
              if ssh -i "$KEY" \
                -o StrictHostKeyChecking=no \
                -o UserKnownHostsFile=/dev/null \
                -o ConnectTimeout=10 \
                -o BatchMode=yes \
                ubuntu@"${PUBLIC_IP}" \
                "echo ssh_ok" 2>/dev/null; then
                echo "SSH is reachable."
                return 0
              fi
              echo "Attempt ${i}/18: SSH not reachable yet, sleeping 10s..."
              sleep 10
            done
            return 1
          }

          run_app_playbook() {
            cd ansible
            ANSIBLE_HOST_KEY_CHECKING=False ansible-playbook -i inventory.ini playbook-app.yml \
            --extra-vars "registry_url=$PUBLIC_IP:443 registry_username=$REGISTRY_USERNAME registry_password=$REGISTRY_TOKEN react_app_server_port=$REACT_APP_SERVER_PORT react_app_api_url=$REACT_APP_API_URL mysql_database=$MYSQL_DATABASE mysql_root_password=$MYSQL_ROOT_PASSWORD"
          }

          collect_remote_diagnostics() {
            echo "Collecting remote diagnostics..."
            if ! wait_for_ssh; then
              echo "SSH is still unreachable, skipping remote diagnostics."
              return 0
            fi

            ssh -i "$KEY" \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=10 \
              ubuntu@"${PUBLIC_IP}" \
              "sudo bash -lc '
                set +e
                echo \"===== SYSTEM =====\"
                date
                uptime
                free -h
                df -h
                echo
                echo \"===== DOCKER SERVICE =====\"
                systemctl is-active docker || true
                journalctl -u docker --no-pager -n 120 || true
                echo
                echo \"===== CONTAINERS =====\"
                docker ps -a || true
                echo
                echo \"===== COMPOSE LOGS =====\"
                cd /home/ubuntu/app-stack && docker compose logs --tail 200 || true
              '" || true
          }

          for attempt in 1 2 3; do
            echo "App deploy attempt ${attempt}/3"
            wait_for_ssh || true
            if run_app_playbook; then
              echo "App deploy succeeded."
              exit 0
            fi
            echo "App deploy attempt ${attempt} failed."
            collect_remote_diagnostics
            sleep 25
            cd "$GITHUB_WORKSPACE"
          done

          echo "App deploy failed after 3 attempts."
          exit 1
