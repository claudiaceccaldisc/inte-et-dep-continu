name: Deploy Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - arnaud-dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: "Construction de l'image frontend"
        run: docker build -t frontend-test -f react.Dockerfile .

      - name: "Construction de l'image API"
        run: docker build -t api-test ./api

      - name: Installation de Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Initialisation Terraform Registry
        run: |
          cd terraform/registry
          terraform init

      - name: Application Terraform Registry
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          cd terraform/registry
          terraform apply -auto-approve

      - name: Initialisation Terraform App
        run: |
          cd terraform/app
          terraform init

      - name: Application Terraform (apply)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          cd terraform/app
          terraform apply -auto-approve

      - name: "Récupération de l'IP publique et de la clé SSH"
        run: |
          cd terraform/registry
          echo "REGISTRY_IP=$(terraform output -raw public_ip)" >> "$GITHUB_ENV"

          cd ../app
          echo "PUBLIC_IP=$(terraform output -raw public_ip)" >> "$GITHUB_ENV"
          terraform output -raw private_key_pem > private_key.pem
          chmod 600 private_key.pem

      - name: Attente du SSH sur la nouvelle instance
        run: |
          KEY="${GITHUB_WORKSPACE}/terraform/app/private_key.pem"
          for i in $(seq 1 40); do
            if ssh -i "$KEY" \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=10 \
              -o BatchMode=yes \
              ubuntu@"${PUBLIC_IP}" \
              "echo ssh_ok"; then
              echo "SSH prêt."
              exit 0
            fi
            echo "Tentative SSH ${i}/40, attente 10s..."
            sleep 10
          done
          echo "Délai dépassé en attendant SSH sur ${PUBLIC_IP}:22"
          exit 1

      - name: Génération du fichier .env
        run: |
          echo "REACT_APP_SERVER_PORT=8000" >> .env
          echo "REACT_APP_API_URL=http://$PUBLIC_IP:8000" >> .env
          echo "MYSQL_DATABASE=users" >> .env
          echo "MYSQL_ROOT_PASSWORD=ynov-CICD" >> .env
          echo "REGISTRY_URL=$REGISTRY_IP:443" >> .env
          echo "REGISTRY_USERNAME=${{ secrets.REGISTRY_USERNAME }}" >> .env
          echo "REGISTRY_TOKEN=${{ secrets.REGISTRY_TOKEN }}" >> .env

      - name: DEBUG - Afficher le .env
        run: |
          echo "===== CONTENU .env ====="
          cat .env

      - name: "Génération de l'inventaire Ansible"
        run: |
          KEY_FILE=../terraform/app/private_key.pem
          {
            echo "[registry_hosts]"
            echo "$PUBLIC_IP ansible_user=ubuntu ansible_ssh_private_key_file=$KEY_FILE"
            echo ""
            echo "[app_hosts]"
            echo "$PUBLIC_IP ansible_user=ubuntu ansible_ssh_private_key_file=$KEY_FILE"
          } > ansible/inventory.ini

      - name: Déploiement du registre privé (Ansible)
        run: |
          set -a
          source .env
          set +a
          cd ansible
          ANSIBLE_HOST_KEY_CHECKING=False ansible-playbook -i inventory.ini playbook.yml \
            --extra-vars "registry_username=$REGISTRY_USERNAME registry_password=$REGISTRY_TOKEN"

      - name: Attente du démarrage du registre
        run: sleep 15

      - name: "Test rapide de l'API du registre"
        run: curl -k -sS "https://$PUBLIC_IP:443/v2/" || true

      - name: Configuration Docker sur le runner (registre auto-signé)
        run: |
          sudo tee /etc/docker/daemon.json > /dev/null <<EOF
          {
            "insecure-registries": ["${PUBLIC_IP}:443"]
          }
          EOF
          sudo systemctl restart docker
          for i in $(seq 1 15); do
            docker info >/dev/null 2>&1 && break
            sleep 2
          done

      - name: Connexion, tag et push des images vers le registre
        run: |
          echo "${{ secrets.REGISTRY_TOKEN }}" | docker login "${PUBLIC_IP}:443" \
            -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin
          docker tag frontend-test "${PUBLIC_IP}:443/frontend:latest"
          docker tag api-test "${PUBLIC_IP}:443/backend:latest"
          docker push "${PUBLIC_IP}:443/frontend:latest"
          docker push "${PUBLIC_IP}:443/backend:latest"

      - name: Pause avant déploiement applicatif
        run: sleep 30

      - name: Déploiement de la stack applicative (Ansible)
        run: |
          set -a
          source .env
          set +a
          cd ansible
          EV="registry_url=$PUBLIC_IP:443 registry_username=$REGISTRY_USERNAME registry_password=$REGISTRY_TOKEN react_app_server_port=$REACT_APP_SERVER_PORT react_app_api_url=$REACT_APP_API_URL mysql_database=$MYSQL_DATABASE mysql_root_password=$MYSQL_ROOT_PASSWORD"
          ANSIBLE_HOST_KEY_CHECKING=False ansible-playbook -i inventory.ini playbook-app.yml --extra-vars "$EV" \
            || ( sleep 30 && ANSIBLE_HOST_KEY_CHECKING=False ansible-playbook -i inventory.ini playbook-app.yml --extra-vars "$EV" )