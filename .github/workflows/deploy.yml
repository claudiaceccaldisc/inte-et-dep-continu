name: Deploy Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - arnaud-dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Step 1 - Build Docker Frontend
        run: docker build -t frontend-test -f react.Dockerfile .

      - name: Step 1 bis - Build Docker API
        run: docker build -t api-test ./api

      - name: Step 2 - Install Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Step 2 bis - Terraform Init
        run: |
          cd terraform/app
          terraform init

      - name: Step 2 ter - Terraform Apply
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          cd terraform/app
          terraform apply -auto-approve

      - name: Step 3 - Get IP and SSH Key
        run: |
          cd terraform/app
          echo "PUBLIC_IP=$(terraform output -raw public_ip)" >> $GITHUB_ENV
          terraform output -raw private_key_pem > private_key.pem
          chmod 600 private_key.pem

      - name: Step 3 bis - Wait and Install Docker
        run: |
          echo "Attente que l'instance soit prête..."
          sleep 30
          cd terraform/app
          ssh -o StrictHostKeyChecking=no -i private_key.pem ubuntu@$PUBLIC_IP "sudo apt update && sudo apt install -y docker.io && sudo docker --version && sudo docker run -d -p 3000:3000 nginx"

      - name: Step 4 - Ansible Deployment
        run: echo "Déploiement avec Ansible sur IP $PUBLIC_IP"