name: Deploy Pipeline Claudia Test

on:
  workflow_dispatch:
  push:
    branches:
      - final-deploy

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      REGISTRY_IP: ${{ vars.REGISTRY_IP }}
      MYSQL_DATABASE: users
      REACT_APP_SERVER_PORT: 3000

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Construction de l'image frontend
        run: docker build -t frontend-test -f react.Dockerfile .

      - name: Construction de l'image API
        run: docker build -t api-test ./api

      - name: Installation de Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configuration Docker sur le runner
        run: |
          sudo mkdir -p /etc/docker
          sudo tee /etc/docker/daemon.json > /dev/null <<EOF
          {
            "insecure-registries": ["${REGISTRY_IP}:443"]
          }
          EOF
          sudo systemctl restart docker
          for i in $(seq 1 15); do
            docker info >/dev/null 2>&1 && break
            sleep 2
          done

      - name: Test rapide de l'API du registre
        run: curl -k -sS "https://${REGISTRY_IP}:443/v2/" || true

      - name: Connexion, tag et push des images vers le registre
        run: |
          echo "${{ secrets.REGISTRY_TOKEN }}" | docker login "${REGISTRY_IP}:443" \
            -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin
          docker tag frontend-test "${REGISTRY_IP}:443/frontend:latest"
          docker tag api-test "${REGISTRY_IP}:443/backend:latest"
          docker push "${REGISTRY_IP}:443/frontend:latest"
          docker push "${REGISTRY_IP}:443/backend:latest"

      - name: Initialisation Terraform App
        run: |
          cd terraform/app
          terraform init

      - name: Application Terraform App
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
        run: |
          cd terraform/app
          terraform apply -auto-approve -var="unique_suffix_enabled=true"

      - name: Récupération de l'IP publique et de la clé SSH
        run: |
          cd terraform/app
          echo "PUBLIC_IP=$(terraform output -raw public_ip)" >> "$GITHUB_ENV"
          terraform output -raw private_key_pem > private_key.pem
          chmod 600 private_key.pem

      - name: Attente du SSH sur la nouvelle instance
        run: |
          KEY="${GITHUB_WORKSPACE}/terraform/app/private_key.pem"
          for i in $(seq 1 40); do
            if ssh -i "$KEY" \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=10 \
              -o BatchMode=yes \
              ubuntu@"${PUBLIC_IP}" \
              "echo ssh_ok"; then
              echo "SSH prêt."
              exit 0
            fi
            echo "Tentative SSH ${i}/40, attente 10s..."
            sleep 10
          done
          echo "Délai dépassé en attendant SSH sur ${PUBLIC_IP}:22"
          exit 1

      - name: Génération de l'inventaire Ansible app
        run: |
          mkdir -p ansible
          KEY_FILE=../terraform/app/private_key.pem
          {
            echo "[app_hosts]"
            echo "$PUBLIC_IP ansible_user=ubuntu ansible_ssh_private_key_file=$KEY_FILE"
          } > ansible/inventory.ini

      - name: Pause avant déploiement applicatif
        run: sleep 30

      - name: Déploiement de la stack applicative
        run: |
          cd ansible
          EV="registry_url=$REGISTRY_IP:443 registry_username=${{ secrets.REGISTRY_USERNAME }} registry_password=${{ secrets.REGISTRY_TOKEN }} react_app_server_port=$REACT_APP_SERVER_PORT react_app_api_url=http://$PUBLIC_IP:8000 mysql_database=$MYSQL_DATABASE mysql_root_password=${{ secrets.MYSQL_ROOT_PASSWORD }}"
          ANSIBLE_HOST_KEY_CHECKING=False ansible-playbook -i inventory.ini playbook-app.yml --extra-vars "$EV" \
            || ( sleep 30 && ANSIBLE_HOST_KEY_CHECKING=False ansible-playbook -i inventory.ini playbook-app.yml --extra-vars "$EV" )

      - name: Validation frontend
        run: |
          for i in $(seq 1 20); do
            if curl -s "http://$PUBLIC_IP:3000" > /dev/null; then
              echo "Frontend OK"
              exit 0
            fi
            echo "Attente frontend ${i}/20..."
            sleep 5
          done
          echo "Frontend KO"
          exit 1

      - name: Validation backend
        run: curl -sS "http://$PUBLIC_IP:8000/users" || exit 1